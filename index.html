<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofias Repetitionsportal - Galaxy Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sätter huvudtypsnittet till Times New Roman */
        body { 
            font-family: 'Times New Roman', Times, serif; 
            font-size: 1.1rem;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
        }

        /* Galaxy/Glassmorphism stil på korten */
        .area-card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex;
            flex-direction: column;
            height: 100%;
            border-radius: 1.5rem;
        }
        
        .area-card:hover { 
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: #c084fc; 
            box-shadow: 0 20px 40px -15px rgba(192, 132, 252, 0.3);
        }
        
        .hero-image { 
            width: 100%; 
            height: auto; 
            display: block;
            filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.4));
        }

        .btn-action { 
            transition: all 0.2s ease; 
            border-radius: 0.75rem;
        }
        
        .btn-action:hover { 
            filter: brightness(1.2); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }
        
        h1, h2, h3 { font-weight: 700; }

        /* Anpassad scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: auto;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: radial-gradient(white, rgba(255,255,255,0.2) 2px, transparent 40px);
            background-size: 200px 200px;
            opacity: 0.1;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="stars-bg"></div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row items-center gap-8 md:gap-12 mb-24">
            <div class="flex-1 text-center md:text-left order-2 md:order-1">
                <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-lavender-300 to-indigo-400 mb-6 tracking-tight italic">
                    Välkommen till Sofias hemsida!
                </h1>
                <div class="h-1 w-32 bg-gradient-to-r from-purple-500 to-transparent mb-6 mx-auto md:mx-0"></div>
            </div>
            <div class="w-full md:w-1/3 lg:w-1/4 order-1 md:order-2">
                <img src="sofia_portal.png" alt="Sofias Portal" class="hero-image rounded-full border-4 border-purple-500/30 p-2 mx-auto" onerror="this.src='https://via.placeholder.com/400x400/1e1b4b/c084fc?text=Sofias+Space+Portal'">
            </div>
        </header>

        <main class="space-y-32">
            <script>
                // Här definierar vi "id" för varje kurs för att skapa filnamn
                const courses = [
                    { id: "eng_grund", name: "Engelska grund", color: "from-purple-500 to-indigo-500" },
                    { id: "eng1", name: "Engelska 1", color: "from-indigo-500 to-blue-500" },
                    { id: "eng6", name: "Engelska 6", color: "from-fuchsia-500 to-purple-500" },
                    { id: "eng7", name: "Engelska 7", color: "from-violet-500 to-indigo-600" }
                ];

                // Här definierar vi "id" för varje område
                const areas = [
                    { id: "reading", title: "Reading", icon: "📖", desc: "Öva läsförståelse" },
                    { id: "writing", title: "Writing", icon: "✍️", desc: "Träna på att skriva" },
                    { id: "listening", title: "Listening", icon: "🎧", desc: "Hörförståelse-övningar" },
                    { id: "speaking", title: "Speaking", icon: "🗣️", desc: "Muntlig interaktion" },
                    { id: "grammar", title: "Grammar", icon: "📝", desc: "Grammatik & Struktur" }
                ];

                document.write(courses.map(course => `
                    <section>
                        <div class="flex items-center gap-6 mb-12">
                            <h2 class="text-4xl font-bold uppercase tracking-[0.3em] text-purple-300 italic">${course.name}</h2>
                            <div class="h-[2px] flex-grow bg-gradient-to-r ${course.color} opacity-30"></div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                            ${areas.map(area => `
                                <div class="area-card p-6 flex flex-col">
                                    <div class="text-4xl mb-4">${area.icon}</div>
                                    <h3 class="text-xl font-bold text-white mb-2">${area.title}</h3>
                                    <p class="text-slate-400 text-sm mb-6 italic">${area.desc}</p>
                                    <div class="button-container">
                                        <!-- Dynamiska länkar baserat på ID -->
                                        <a href="${course.id}_${area.id}.html" class="btn-action block w-full bg-gradient-to-r ${course.color} text-white py-2 rounded-lg font-bold text-center text-sm uppercase">Öva nu</a>
                                        <a href="${course.id}_${area.id}_resurser.html" class="btn-action block w-full bg-white/5 text-slate-300 py-2 rounded-lg font-bold text-center text-xs border border-white/10 italic">Resurser</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                `).join(''));
            </script>
        </main>

        <footer class="mt-32 text-center border-t border-white/10 pt-16 pb-16">
            <p class="text-purple-400 text-sm uppercase tracking-[0.4em] font-light italic">
                ✨ Exploring the Universe of English with Sofia ✨
            </p>
        </footer>
    </div>
</body>
</html>
